server:
  port: 8080

spring:
  application:
    name: toolize
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  output:
    ansi:
      enabled: ALWAYS

toolize:
  data-dir: ${TOOLIZE_DATA_DIR:/data}
  admin:
    username: ${TOOLIZE_ADMIN_USERNAME:admin}
    password: ${TOOLIZE_ADMIN_PASSWORD:admin}

logging:
  level:
    root: INFO
    com.toolize: INFO
