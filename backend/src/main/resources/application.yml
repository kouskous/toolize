server:
  port: 8080

spring:
  application:
    name: toolize
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  output:
    ansi:
      enabled: ALWAYS
  # Zero-config default: an embedded, file-based database so "docker run" works
  # immediately with no external database to stand up. PostgreSQL compatibility
  # mode keeps its SQL dialect close to real Postgres, in case that's where a
  # user ends up moving their data. Set TOOLIZE_DB_TYPE (and _HOST/_PORT/_NAME/
  # _USERNAME/_PASSWORD) to point at a real Postgres/MySQL/Oracle instead - see
  # DatasourceEnvironmentPostProcessor, which overrides these values from those
  # plain env vars before the datasource bean is created.
  datasource:
    url: "jdbc:h2:file:${TOOLIZE_DATA_DIR:/data}/toolize;MODE=PostgreSQL;DATABASE_TO_UPPER=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

toolize:
  data-dir: ${TOOLIZE_DATA_DIR:/data}
  admin:
    username: ${TOOLIZE_ADMIN_USERNAME:admin}
    password: ${TOOLIZE_ADMIN_PASSWORD:admin}

logging:
  level:
    root: INFO
    com.toolize: INFO
