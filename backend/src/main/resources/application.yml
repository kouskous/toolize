server:
  port: 8080

spring:
  application:
    name: toolize
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  output:
    ansi:
      enabled: ALWAYS
  # Lets a user pick a production database (Postgres/MySQL/Oracle) from the
  # Database setup screen without rebuilding the image: SetupController writes
  # its choice here, and this file - if present - overrides the H2 default below.
  config:
    import: "optional:file:${TOOLIZE_DATA_DIR:/data}/datasource.properties"
  # Zero-config default: an embedded, file-based database so "docker run" works
  # immediately with no external database to stand up. PostgreSQL compatibility
  # mode keeps its SQL dialect close to real Postgres, in case that's where a
  # user ends up moving their data.
  datasource:
    url: "jdbc:h2:file:${TOOLIZE_DATA_DIR:/data}/toolize;MODE=PostgreSQL;DATABASE_TO_UPPER=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

toolize:
  data-dir: ${TOOLIZE_DATA_DIR:/data}
  admin:
    username: ${TOOLIZE_ADMIN_USERNAME:admin}
    password: ${TOOLIZE_ADMIN_PASSWORD:admin}

logging:
  level:
    root: INFO
    com.toolize: INFO
